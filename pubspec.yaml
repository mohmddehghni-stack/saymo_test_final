name: flutter_application_1
description: "اپ عاشقونه - تماشای همزمان، چت، تقویم و پریود"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  shared_preferences: ^2.3.3

  provider: ^6.1.1

  hive: ^2.2.3
  hive_flutter: ^1.1.0

  http: ^1.2.0
  web_socket_channel: ^3.0.1

  video_player: ^2.10.0
  image_picker: ^1.1.2
  file_picker: ^8.1.4

  shamsi_date: ^1.0.4
  persian_datetime_picker: ^3.2.0

  geolocator: ^13.0.1

  lottie: ^3.3.2
  shimmer: ^3.0.0

  camera: ^0.11.1

  pinput: ^3.0.1

  device_info_plus: ^11.1.0
  package_info_plus: ^8.1.0

  share_plus: ^10.1.2

  flutter_localizations:
    sdk: flutter

  connectivity_plus: ^7.0.0
  animated_emoji: ^3.2.1
  flutter_image_compress: ^2.4.0
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/lottie/female_avatar.json
    - assets/lottie/male_avatar.json

  fonts:
    - family: titr
      fonts:
        - asset: fonts/ITitrBd.ttf
    - family: titr1
      fonts:
        - asset: fonts/BTitrBd.ttf
    - family: Vazir
      fonts:
        - asset: fonts/VazirBold.ttf